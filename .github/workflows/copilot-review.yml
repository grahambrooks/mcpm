name: GitHub Copilot Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    name: Copilot Review

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-branch
          echo "diff=$(git diff origin/${{ github.event.pull_request.base.ref }}...pr-branch)" >> $GITHUB_OUTPUT

      - name: Review with Copilot via GitHub API
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            // Get PR details
            const pr = context.payload.pull_request;
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            
            // Prepare review comment
            let reviewBody = '## 🤖 AI-Powered Code Review\n\n';
            reviewBody += '### Files Changed\n';
            
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            
            // Analyze each changed file
            for (const file of files.data) {
              if (file.filename.endsWith('.rs') || file.filename.includes('Cargo')) {
                reviewBody += `\n#### ${file.filename}\n`;
                reviewBody += `- Additions: ${file.additions}\n`;
                reviewBody += `- Deletions: ${file.deletions}\n`;
                reviewBody += `- Changes: ${file.changes}\n`;
              }
            }
            
            reviewBody += '\n### Recommendations\n';
            reviewBody += '- ✅ Follow Rust conventions and idioms\n';
            reviewBody += '- ✅ Ensure error handling is comprehensive\n';
            reviewBody += '- ✅ Keep functions focused and small\n';
            reviewBody += '- ✅ Add documentation for public APIs\n';
            
            // Post review as comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: reviewBody
            });
