name: Copilot Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    name: Review Code with GitHub Copilot

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            src/**/*.rs
            Cargo.toml
            Cargo.lock

      - name: Review with Copilot
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: github/copilot-code-review-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Comment with review summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewFile = 'copilot-review.md';
            
            if (fs.existsSync(reviewFile)) {
              const review = fs.readFileSync(reviewFile, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## 🤖 Copilot Code Review\n\n' + review
              });
            }
