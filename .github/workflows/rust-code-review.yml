name: AI Code Review with Copilot

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - develop

permissions:
  pull-requests: write
  contents: read
  checks: write

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    name: Copilot Code Review

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            src/**/*.rs
            Cargo.toml
            Cargo.lock

      - name: Review Rust code quality
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = '${{ steps.changed-files.outputs.all_changed_files }}'.split('\n').filter(f => f);
            
            if (changedFiles.length === 0) {
              console.log('No relevant files changed');
              return;
            }
            
            const fs = require('fs');
            const exec = require('child_process').execSync;
            
            let reviewComments = '## 📝 Code Review Summary\n\n';
            
            // Run clippy for code quality
            try {
              reviewComments += '### Clippy Analysis\n';
              const clippy = exec('cargo clippy -- -D warnings 2>&1', { encoding: 'utf8' });
              reviewComments += '✅ No clippy warnings\n\n';
            } catch (error) {
              reviewComments += '⚠️ Clippy warnings found:\n```\n' + error.toString() + '\n```\n\n';
            }
            
            // Create comment with review
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reviewComments
            });

      - name: Check code formatting
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          cargo fmt --check
        continue-on-error: true

      - name: Run tests
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          cargo test --lib
        continue-on-error: true
